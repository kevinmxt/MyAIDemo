<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地知识库智能问答系统</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <span class="logo">📚</span>
            <h1>本地知识库问答系统</h1>
        </div>
        <span class="version">v1.0</span>
    </header>

    <div class="main-container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h2>知识库管理</h2>
                <div class="ingest-section">
                    <label for="ingestDir">摄入新文档</label>
                    <div class="input-row">
                        <input type="text" id="ingestDir" placeholder="输入文档目录路径...">
                        <button id="ingestBtn" onclick="ingestDocuments()">摄入</button>
                    </div>
                    <div id="ingestStatus" class="status-message"></div>
                </div>

                <div class="documents-section">
                    <div class="documents-header">
                        <h3>已索引文档</h3>
                        <button id="refreshBtn" onclick="refreshDocuments()" title="刷新">↻</button>
                    </div>
                    <div id="documentList" class="document-list">
                        <div class="empty-state">点击刷新加载文档列表</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="store-info">
                    <span id="storeStatus">存储状态: 加载中...</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div id="chatMessages" class="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-icon">🤖</div>
                    <h2>欢迎使用本地知识库问答系统</h2>
                    <p>请先在左侧面板导入文档，然后开始提问。</p>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-container">
                    <textarea id="chatInput" placeholder="输入你的问题..." rows="2" onkeydown="handleKeyDown(event)"></textarea>
                    <button id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
